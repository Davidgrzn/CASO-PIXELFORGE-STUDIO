services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: wazuh_manager
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword(1)
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/certs/ca.crt
      - SSL_CERTIFICATE=/etc/ssl/certs/server.crt
      - SSL_KEY=/etc/ssl/certs/server.key
      - WAZUH_API_URL=https://wazuh-manager
      - WAZUH_CLUSTER_MASTER_NODE=yes
    ports:
      - "15140:1514"
      - "15150:1515"
      - "5140:514/udp"
      - "55000:55000"
    volumes:
      - wazuh_manager_api_logs:/var/ossec/logs
      - wazuh_manager_etc:/var/ossec/etc
      - wazuh_manager_queue:/var/ossec/queue
    networks:
      - wazuh_net
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:55000/version", "-k"]
      interval: 15s
      timeout: 10s
      retries: 5

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.5
    container_name: wazuh_indexer
    environment:
      - INDEXER_SECURITY_SSL_HTTP_ENABLED=true
      - INDEXER_SECURITY_SSL_HTTP_PEMCERT_FILE_PATH=/etc/ssl/certs/node-cert.pem
      - INDEXER_SECURITY_SSL_HTTP_PEMKEY_FILE_PATH=/etc/ssl/certs/node-key.pem
      - INDEXER_SECURITY_SSL_HTTP_PEMTRUSTEDCAS_FILE_PATH=/etc/ssl/certs/root-ca.pem
      - INDEXER_CLUSTER_NODES=wazuh-indexer
      - INDEXER_CLUSTER_INITIAL_MASTER_NODES=wazuh-indexer
      - CLUSTER_NODE_CONF_DIR=/usr/share/wazuh-indexer/certs
      - DISABLE_SECURITY_PLUGIN=false
      - JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - wazuh_indexer_data:/usr/share/wazuh-indexer/data
    networks:
      - wazuh_net
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "admin:SecretPassword(1)", "https://localhost:9200/", "-k"]
      interval: 15s
      timeout: 10s
      retries: 5

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.5
    container_name: wazuh_dashboard
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword(1)
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
    ports:
      - "443:5601"
    volumes:
      - wazuh_dashboard_etc:/usr/share/wazuh-dashboard/certs/dashboard
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    networks:
      - wazuh_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  wazuh_manager_api_logs:
  wazuh_manager_etc:
  wazuh_manager_queue:
  wazuh_indexer_data:
  wazuh_dashboard_etc:

networks:
  wazuh_net:
    driver: bridge
