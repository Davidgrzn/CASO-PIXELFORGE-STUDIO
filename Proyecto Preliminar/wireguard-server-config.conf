# Configuración WireGuard para PixelForge Studio
# Esta configuración establece una VPN privada entre los nodos del sistema

# ============================================
# SERVIDOR WIREGUARD (Gateway Principal)
# ============================================
# Este archivo se coloca en: /etc/wireguard/wg0.conf

[Interface]
# Configuración de la interfaz del servidor
Address = 10.0.0.1/24
ListenPort = 51820
PrivateKey = SERVIDOR_PRIVATE_KEY_AQUI
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# ============================================
# PEER 1: Backend (10.0.0.2/32)
# ============================================
[Peer]
# Backend FastAPI
PublicKey = BACKEND_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.2/32
Endpoint = BACKEND_PUBLIC_IP:51820

# ============================================
# PEER 2: Frontend (10.0.0.3/32)
# ============================================
[Peer]
# Frontend React
PublicKey = FRONTEND_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.3/32
Endpoint = FRONTEND_PUBLIC_IP:51820

# ============================================
# PEER 3: Database (10.0.0.4/32)
# ============================================
[Peer]
# PostgreSQL
PublicKey = DATABASE_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.4/32
Endpoint = DATABASE_PUBLIC_IP:51820

# ============================================
# PEER 4: Wazuh Manager (10.0.0.5/32)
# ============================================
[Peer]
# Wazuh SIEM Manager
PublicKey = WAZUH_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.5/32
Endpoint = WAZUH_PUBLIC_IP:51820

# ============================================
# PEERS ADICIONALES: Computadoras del Grupo
# ============================================
[Peer]
# Máquina Dev/Estudiante 1 (10.0.0.100/32)
PublicKey = DEV1_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.100/32

[Peer]
# Máquina Dev/Estudiante 2 (10.0.0.101/32)
PublicKey = DEV2_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.101/32

[Peer]
# Máquina Dev/Estudiante 3 (10.0.0.102/32)
PublicKey = DEV3_PUBLIC_KEY_AQUI
AllowedIPs = 10.0.0.102/32
