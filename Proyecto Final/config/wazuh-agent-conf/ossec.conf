<ossec_config>
  <client>
    <server>
      <address>wazuh.manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <!-- Logs del backend de tu proyecto -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/logs/backend/*.log</location>
  </localfile>

  <!-- Logs de todos los contenedores Docker -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/lib/docker/containers/*/*.log</location>
  </localfile>

  <!-- FIM: detectar cambios en logs del backend -->
  <syscheck>
    <frequency>300</frequency>
    <directories check_all="yes" report_changes="yes" realtime="yes">
      /logs/backend
    </directories>
  </syscheck>

</ossec_config>